name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: pnw-fitness/package-lock.json

      - name: Install dependencies
        working-directory: pnw-fitness
        run: npm ci

      - name: Build
        working-directory: pnw-fitness
        env:
          VITE_GOOGLE_CAL_API_KEY: ${{ secrets.VITE_GOOGLE_CAL_API_KEY }}
        run: npm run build

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: pnw-fitness/dist
